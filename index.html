<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 知识库 —— AI 工具官方文档中文版与全网实践精华聚合:Claude Code、Codex、Pencil、环境急救等,持续扩充。">
<meta name="theme-color" content="#0b1220">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>AI 知识库 · 主题中心</title>
<style>
:root{
  --ink:#0b1220; --bg:#f6f8fb;
  --text:#1f2430; --text-2:#5a6272; --text-3:#8b93a5;
  --border:#e7eaf0; --border-2:#d9dee8;
  --brand:#5b5bf6;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  --mono:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.7;font-size:15.5px}
::selection{background:var(--brand);color:#fff}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

.topbar{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;display:flex;align-items:center;gap:14px;
  padding:0 28px;background:rgba(246,248,251,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px}
.logo .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5b5bf6,#0ea5e9);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;letter-spacing:.5px}
.topbar .right{margin-left:auto;font-size:12.5px;color:var(--text-3);display:flex;align-items:center;gap:8px}
.topbar .right kbd{font-family:var(--mono);font-size:10.5px;border:1px solid var(--border-2);border-radius:4px;
  padding:1px 5px;background:#fff;color:var(--text-3)}

.wrap{max-width:1080px;margin:0 auto;padding:60px 32px 100px}

.hero{margin-top:32px;border-radius:20px;position:relative;overflow:hidden;color:#eaf1fb;
  background:
    radial-gradient(900px 380px at 85% -30%,rgba(14,165,233,.4),transparent 60%),
    radial-gradient(800px 380px at 0% 130%,rgba(91,91,246,.45),transparent 60%),
    var(--ink);
  padding:40px 44px 32px}
.hero h1{font-size:28px;line-height:1.25;letter-spacing:-.5px;font-weight:800;color:#fff;display:inline}
.hero .grad{background:linear-gradient(90deg,#818cf8,#38bdf8);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .tagline{display:inline;margin-left:14px;font-size:13.5px;color:#94a3c0}
.searchbar{margin-top:20px;position:relative}
.searchbar .ic{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5}
.searchbar input{width:100%;padding:15px 110px 15px 46px;font-size:15.5px;font-family:var(--font);
  border:1px solid rgba(255,255,255,.14);border-radius:14px;outline:none;color:#eef3fb;
  background:rgba(255,255,255,.08);transition:.2s}
.searchbar input::placeholder{color:#7e8aa3}
.searchbar input:focus{background:rgba(255,255,255,.13);border-color:rgba(129,140,248,.6)}
.searchbar .keys{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.searchbar .keys kbd{font-family:var(--mono);font-size:10.5px;color:#94a3c0;border:1px solid rgba(255,255,255,.2);
  border-radius:5px;padding:2px 7px}
.hot{margin-top:14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:12px;color:#7e8aa3}
.hot button{font-family:var(--font);font-size:12px;color:#a5b4d4;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);border-radius:99px;padding:3px 12px;cursor:pointer;transition:.15s}
.hot button:hover{color:#fff;border-color:rgba(129,140,248,.7);background:rgba(129,140,248,.18)}
.hero .qmeta{margin-top:12px;font-size:12px;color:#7e8aa3}

.resume{display:none;margin:18px 0 0;align-items:center;gap:12px;padding:13px 18px;background:#fff;
  border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:.18s;position:relative}
.resume.on{display:flex}
.resume:hover{border-color:var(--brand);box-shadow:0 8px 26px rgba(91,91,246,.10)}
.resume .ric{width:36px;height:36px;border-radius:10px;background:#eef0ff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.resume .rt{font-size:11.5px;color:var(--text-3)}
.resume .rl{font-size:14px;font-weight:650;line-height:1.4}
.resume .go{margin-left:auto;color:var(--brand);font-weight:700;font-size:13px;white-space:nowrap}
.resume .close{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:99px;border:1px solid var(--border-2);
  background:#fff;color:var(--text-3);font-size:11px;cursor:pointer;line-height:1}

.sec{display:flex;align-items:baseline;gap:14px;margin:40px 0 16px;flex-wrap:wrap}
.sec h2{font-size:20px;font-weight:800;letter-spacing:-.3px}
.sec span{font-size:12.5px;color:var(--text-3)}

/* 学习路径 */
.paths{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.path{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 22px 14px;position:relative;overflow:hidden}
.path::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--pc,#5b5bf6);opacity:.9}
.path .ph{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.path .pic{font-size:20px}
.path b{font-size:15.5px;font-weight:750}
.path>p{font-size:12.5px;color:var(--text-2);margin:0 0 10px}
.path ol{list-style:none;margin:0;padding:0}
.path ol a{display:flex;gap:10px;padding:7px 8px;margin:0 -8px;border-radius:9px;text-decoration:none;
  color:var(--text);font-size:13px;transition:.15s;align-items:baseline}
.path ol a:hover{background:color-mix(in srgb,var(--pc,#5b5bf6) 8%,#fff)}
.path ol a:hover .sl{color:var(--pc,#5b5bf6)}
.path ol .n{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--pc,#5b5bf6);flex:none;width:15px}
.path ol .sl{font-weight:600;display:block;line-height:1.45}
.path ol .pn{font-size:11.5px;color:var(--text-3);display:block;line-height:1.5}

/* 标签筛选 */
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px}
.tabs button{font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--text-2);background:#fff;
  border:1px solid var(--border);border-radius:99px;padding:5.5px 15px;cursor:pointer;transition:.15s;display:flex;gap:6px;align-items:center}
.tabs button .n{font-family:var(--mono);font-size:10.5px;color:var(--text-3)}
.tabs button:hover{border-color:var(--brand);color:var(--brand)}
.tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.tabs button.on .n{color:#94a3c0}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:20px}
.topic{position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid var(--border);
  border-radius:18px;padding:24px 26px 18px;color:var(--text);transition:.2s;overflow:hidden}
.topic::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--tc,#5b5bf6);opacity:.9}
.topic:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(15,23,42,.10);border-color:var(--tc,#5b5bf6)}
.topic.hidden{display:none}
/* 整卡真实链接:绝对定位覆盖层,章节快链层级更高仍可点 */
.topic .cover{position:absolute;inset:0;z-index:1;border-radius:18px}
.topic .chips,.topic .foot{position:relative;z-index:2}
.topic .head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.topic .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;background:color-mix(in srgb,var(--tc,#5b5bf6) 10%,#fff);border:1px solid color-mix(in srgb,var(--tc,#5b5bf6) 25%,#fff)}
.topic .tag{font-size:11.5px;font-weight:700;letter-spacing:.08em;color:var(--tc,#5b5bf6);text-transform:uppercase}
.topic .head .arrow{margin-left:auto;color:var(--text-3);font-size:15px;transition:.2s}
.topic:hover .head .arrow{color:var(--tc,#5b5bf6);transform:translateX(3px)}
.topic b.tt{font-size:16.5px;font-weight:750;line-height:1.4;display:block;margin-bottom:6px}
.topic p{font-size:13px;color:var(--text-2);margin-bottom:14px}
.topic .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.topic .chips a{font-size:11.5px;color:var(--text-2);background:#f4f6fa;border:1px solid var(--border);
  padding:3.5px 11px;border-radius:99px;text-decoration:none;transition:.15s;white-space:nowrap}
.topic .chips a:hover{color:var(--tc,#5b5bf6);border-color:var(--tc,#5b5bf6);background:#fff}
.topic .chips a.more{color:var(--text-3);background:transparent;border-style:dashed}
.topic .foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text-3);
  border-top:1px solid var(--border);padding-top:12px;margin-top:auto}
.topic .foot .lastread{margin-left:auto;color:var(--tc,#5b5bf6);font-weight:600;text-decoration:none;white-space:nowrap}
.topic .foot .lastread:hover{text-decoration:underline}

.results{display:none;margin-top:26px}
.results.on{display:block}
.res-count{font-size:12.5px;color:var(--text-3);margin-bottom:12px}
.res{display:flex;align-items:center;gap:12px;padding:12px 18px;background:#fff;border:1px solid var(--border);
  border-radius:12px;text-decoration:none;color:var(--text);margin-bottom:8px;transition:.15s}
.res:hover,.res.sel{border-color:var(--rc,#5b5bf6);box-shadow:0 6px 20px rgba(15,23,42,.07)}
.res.sel{background:#fcfdff}
.res .badge{flex:none;font-size:11px;font-weight:700;color:#fff;background:var(--rc,#5b5bf6);
  padding:3px 10px;border-radius:99px;white-space:nowrap}
.res b{font-size:14px;font-weight:600}
.res .path{font-size:12px;color:var(--text-3);margin-left:2px}
.res .go{margin-left:auto;color:var(--text-3);font-size:13px;white-space:nowrap}
.res:hover .go,.res.sel .go{color:var(--rc,#5b5bf6)}
.res mark{background:#fff3bf;color:inherit;border-radius:3px;padding:0 1px}
.res-empty{padding:34px;text-align:center;color:var(--text-3);font-size:13.5px;background:#fff;
  border:1px dashed var(--border-2);border-radius:14px}

/* 精选学习站 */
.learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:8px}
.learn{position:relative;display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;color:var(--text);transition:.18s}
.learn:hover{border-color:var(--lc,#5b5bf6);box-shadow:0 10px 30px rgba(15,23,42,.08);transform:translateY(-2px)}
.learn .cover{position:absolute;inset:0;z-index:1;border-radius:14px}
.learn .quick{position:relative;z-index:2}
.learn .lh{display:flex;align-items:center;gap:8px}
.learn .lic{font-size:17px}
.learn .ltag{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--lc,#5b5bf6);
  background:color-mix(in srgb,var(--lc,#5b5bf6) 10%,#fff);border:1px solid color-mix(in srgb,var(--lc,#5b5bf6) 25%,#fff);
  padding:2px 8px;border-radius:99px;white-space:nowrap}
.learn .lh .ext{margin-left:auto;color:var(--text-3);font-size:12.5px;transition:.18s}
.learn:hover .lh .ext{color:var(--lc,#5b5bf6);transform:translate(2px,-2px)}
.learn b{font-size:14.5px;font-weight:750}
.learn p{font-size:12.5px;color:var(--text-2);margin:0;flex:1;line-height:1.65}
.learn .quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.learn .quick a{font-size:11.5px;font-weight:600;color:var(--lc,#5b5bf6);background:#fff;
  border:1px solid color-mix(in srgb,var(--lc,#5b5bf6) 35%,#fff);padding:3.5px 11px;border-radius:99px;text-decoration:none;transition:.15s}
.learn .quick a:hover{background:color-mix(in srgb,var(--lc,#5b5bf6) 8%,#fff)}
.learn.featured{grid-column:1/-1;background:linear-gradient(100deg,#fffbeb,#fff 65%);border-color:#fde68a}
.learn.featured b{font-size:16.5px}
.learn.featured p{font-size:13px}
.learn.featured .fbadge{position:absolute;top:-10px;left:16px;font-size:10.5px;font-weight:800;color:#92400e;
  background:#fde68a;padding:2.5px 11px;border-radius:99px;letter-spacing:.08em;z-index:2}

.add-note{margin-top:22px;padding:13px 18px;border:1.5px dashed var(--border-2);border-radius:14px;
  font-size:12.5px;color:var(--text-3);text-align:center}
.add-note code{font-family:var(--mono);font-size:11.5px;background:#fff;border:1px solid var(--border);
  border-radius:5px;padding:1px 6px}

.footer{margin-top:56px;padding-top:24px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text-3);
  display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between}
.footer a{color:var(--text-3)}

@media (max-width:720px){
  .wrap{padding:60px 18px 80px}
  .hero{padding:28px 22px 24px}
  .hero .tagline{display:block;margin:8px 0 0}
  .searchbar input{padding-right:52px}
  .searchbar .keys{display:none}
  .hot{display:none}
  .topbar .right{display:none}          /* 手机无键盘,「按 / 搜索」提示无意义,让位给 logo */
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo"><span class="mark">AI</span>AI 知识库</div>
  <div class="right"><span>按</span><kbd>/</kbd><span>即可搜索全站</span></div>
</header>

<div class="wrap">

<div class="hero">
  <h1>AI <span class="grad">知识库</span></h1><span class="tagline">AI 工具文档中文版 · 全网实践精华 · 持续扩充</span>
  <div class="searchbar">
    <span class="ic">🔍</span>
    <input id="q" placeholder="搜索全部主题与章节,如:快捷键、登录报错、CLAUDE.md、避坑…" autocomplete="off"
      aria-label="搜索全部主题与章节">
    <span class="keys"><kbd>↑↓</kbd><kbd>Enter</kbd></span>
  </div>
  <div class="hot" id="hot"><span>热门:</span></div>
  <div class="qmeta" id="qmeta"></div>
</div>

<a class="resume" id="resume">
  <span class="ric">📖</span>
  <span><span class="rt">继续上次阅读</span><br><span class="rl" id="resumeLabel"></span></span>
  <span class="go">继续 →</span>
  <button class="close" id="resumeClose" title="不再显示" aria-label="不再显示继续阅读">✕</button>
</a>

<div class="results" id="results" aria-live="polite"></div>

<div id="browse">
  <div class="sec"><h2>学习路径</h2><span>三条路线把主题串成课程表 · 按序走完即可</span></div>
  <div class="paths" id="paths"></div>

  <div class="sec"><h2>全部主题</h2><span id="topicCount"></span></div>
  <div class="tabs" id="tabs" role="tablist" aria-label="按类型筛选主题"></div>
  <div class="grid" id="grid"></div>

  <div class="sec"><h2>精选学习站</h2><span>在精不在多 · 点击直达外站</span></div>
  <div class="learn-grid" id="learnGrid"></div>

  <div class="add-note">＋ 新增主题:HTML 放入 <code>topics/</code>,并在 <code>assets/js/topics.js</code> 追加一条注册(可选 <code>keywords</code> 提升可搜性)—— 卡片、筛选标签、章节快链与全站搜索自动生效</div>
</div>

<div class="footer">
  <div>AI 知识库 · 非官方资料整理,内容以各来源原文为准</div>
  <div id="footMeta">整理:jackyz</div>
</div>

</div>

<script src="assets/js/topics.js"></script>
<script>
const $=s=>document.querySelector(s);
const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

/* ---------- 阅读记忆(先读,供卡片“上次读到”角标使用) ---------- */
let last=null;
try{last=JSON.parse(localStorage.getItem('pkb-last')||'null')}catch(e){}

/* ---------- 主题卡片(整卡真实链接 + 章节快链 + 上次读到) ---------- */
const grid=$('#grid');
grid.innerHTML=TOPICS.map((t,ti)=>{
  const isLast=last&&last.page&&t.href.split('/').pop()===last.page;
  return `
  <article class="topic" style="--tc:${t.color}" data-tag="${escq(t.tag)}">
    <a class="cover" href="${t.href}" aria-label="${escq(t.title)}"></a>
    <div class="head"><div class="ic">${t.icon}</div><div class="tag">${escq(t.tag)}</div><span class="arrow">→</span></div>
    <b class="tt">${escq(t.title)}</b>
    <p>${escq(t.desc)}</p>
    <div class="chips">
      ${t.sections.slice(0,6).map(s=>`<a href="${t.href}#${s.id}">${escq(s.label)}</a>`).join('')}
      <a class="more" href="${t.href}">全部 ${t.sections.length} 章</a>
    </div>
    <div class="foot">${t.meta.map(m=>`<span>${escq(m)}</span>`).join(' · ')}
      ${isLast?`<a class="lastread" href="${t.href}#${last.anchor}">📖 上次读到:${escq(last.label)}</a>`:''}
    </div>
  </article>`}).join('');
const totalSections=TOPICS.reduce((n,t)=>n+t.sections.length,0);
$('#topicCount').textContent=`${TOPICS.length} 个主题 · ${totalSections} 个章节`;
$('#footMeta').textContent=`整理:jackyz · ${TOPICS.length} 主题 ${totalSections} 章节 · 2026-07`;

/* ---------- 标签筛选(从 TOPICS 自动派生,新主题新标签自动出现) ---------- */
const tabs=$('#tabs');
const tagCount={};TOPICS.forEach(t=>tagCount[t.tag]=(tagCount[t.tag]||0)+1);
const tagList=['全部',...Object.keys(tagCount)];
tabs.innerHTML=tagList.map((tg,i)=>
  `<button role="tab" aria-selected="${i===0}" class="${i===0?'on':''}" data-tag="${escq(tg)}">${escq(tg)}
   <span class="n">${tg==='全部'?TOPICS.length:tagCount[tg]}</span></button>`).join('');
tabs.addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  tabs.querySelectorAll('button').forEach(x=>{x.classList.toggle('on',x===b);x.setAttribute('aria-selected',x===b)});
  const tg=b.dataset.tag;
  grid.querySelectorAll('.topic').forEach(c=>
    c.classList.toggle('hidden',tg!=='全部'&&c.dataset.tag!==tg));
});

/* ---------- 学习路径 ---------- */
const pg=$('#paths');
if(typeof PATHS!=='undefined'&&pg){
  pg.innerHTML=PATHS.map(p=>`
    <div class="path" style="--pc:${p.color}">
      <span class="ph"><span class="pic">${p.icon}</span><b>${escq(p.title)}</b></span>
      <p>${escq(p.desc)}</p>
      <ol>${p.steps.map((s,i)=>`
        <li><a href="${s.href}"${s.ext?' target="_blank" rel="noopener"':''}>
          <span class="n">${i+1}</span>
          <span><span class="sl">${escq(s.label)}${s.ext?' ↗':''}</span><span class="pn">${escq(s.note)}</span></span>
        </a></li>`).join('')}
      </ol>
    </div>`).join('');
}

/* ---------- 精选学习站(整卡真实链接) ---------- */
const lg=$('#learnGrid');
if(typeof LEARN!=='undefined'&&lg){
  lg.innerHTML=LEARN.map(l=>`
    <div class="learn${l.featured?' featured':''}" style="--lc:${l.color}">
      ${l.featured?'<span class="fbadge">★ 首选推荐</span>':''}
      <a class="cover" href="${l.href}" target="_blank" rel="noopener" aria-label="${escq(l.title)}(外站)"></a>
      <span class="lh"><span class="lic">${l.icon}</span><span class="ltag">${escq(l.tag)}</span><span class="ext">↗</span></span>
      <b>${escq(l.title)}</b>
      <p>${escq(l.desc)}</p>
      ${l.links?`<span class="quick">${l.links.map(k=>
        `<a href="${k.href}" target="_blank" rel="noopener">${escq(k.label)}</a>`).join('')}</span>`:''}
    </div>`).join('');
}

/* ---------- 继续上次阅读横幅 ---------- */
try{
  const dismissed=localStorage.getItem('pkb-resume-dismissed');
  const hit=last&&last.page&&TOPICS.find(t=>t.href.split('/').pop()===last.page);
  if(hit&&dismissed!==String(last.ts)){
    const r=$('#resume');
    r.href=hit.href+'#'+last.anchor;
    $('#resumeLabel').textContent=`${last.doc} › ${last.label}`;
    r.classList.add('on');
    $('#resumeClose').addEventListener('click',e=>{
      e.preventDefault();e.stopPropagation();
      localStorage.setItem('pkb-resume-dismissed',String(last.ts));
      r.classList.remove('on');
    });
  }
}catch(e){}

/* ---------- 全站搜索(主题 + 章节直达 + keywords 别名) ---------- */
const INDEX=[];
TOPICS.forEach(t=>{
  const kw=(t.keywords||'').toLowerCase();
  INDEX.push({topic:t,label:t.title,id:'',text:(t.title+' '+t.desc+' '+t.tag+' '+kw).toLowerCase(),isTopic:true});
  t.sections.forEach(s=>INDEX.push({topic:t,label:s.label,id:s.id,
    text:(s.label+' '+t.title+' '+kw).toLowerCase(),isTopic:false}));
});
if(typeof LEARN!=='undefined')LEARN.forEach(l=>INDEX.push({
  topic:{href:l.href,color:l.color,tag:'学习站',title:l.title},
  label:l.title,id:'',text:(l.title+' '+l.desc+' '+l.tag+' 学习 教程').toLowerCase(),isTopic:true,ext:true}));
const q=$('#q'),results=$('#results'),browse=$('#browse'),qmeta=$('#qmeta');
let sel=0,shown=[];
qmeta.textContent=`已收录 ${INDEX.length} 条可跳转条目`;
function hl(s,kw){if(!kw)return escq(s);
  const i=s.toLowerCase().indexOf(kw);if(i<0)return escq(s);
  return escq(s.slice(0,i))+'<mark>'+escq(s.slice(i,i+kw.length))+'</mark>'+escq(s.slice(i+kw.length))}
function doSearch(){
  const kw=q.value.trim().toLowerCase();
  if(!kw){results.classList.remove('on');browse.style.display='';shown=[];return}
  /* 多词 AND:空格分词,全部命中才算 */
  const terms=kw.split(/\s+/).filter(Boolean);
  const all=INDEX.filter(it=>terms.every(w=>it.text.includes(w)));
  /* 主题命中排前,章节其次 */
  shown=[...all.filter(x=>x.isTopic),...all.filter(x=>!x.isTopic)].slice(0,30);
  if(sel>=shown.length)sel=Math.max(0,shown.length-1);
  browse.style.display='none';results.classList.add('on');
  results.innerHTML=shown.length?
    `<div class="res-count">${shown.length} 条结果 · Enter 打开选中项 · Esc 返回</div>`+
    shown.map((it,i)=>`
      <a class="res${i===sel?' sel':''}" style="--rc:${it.topic.color}" data-i="${i}"
         href="${it.topic.href}${it.id?'#'+it.id:''}"${it.ext?' target="_blank" rel="noopener"':''}>
        <span class="badge">${escq(it.topic.tag)}</span>
        <b>${hl(it.label,terms[0])}</b>
        ${it.isTopic?'':`<span class="path">${escq(it.topic.title)}</span>`}
        <span class="go">${it.ext?'外站 ↗':'打开 →'}</span>
      </a>`).join('')
    :'<div class="res-empty">没有匹配结果——换个关键词试试,或按 Esc 浏览全部主题</div>';
  const s=results.querySelector('.res.sel');s&&s.scrollIntoView({block:'nearest'});
}
q.addEventListener('input',()=>{sel=0;doSearch()});
q.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();if(sel<shown.length-1)sel++;doSearch()}
  else if(e.key==='ArrowUp'){e.preventDefault();if(sel>0)sel--;doSearch()}
  else if(e.key==='Enter'){e.preventDefault();const it=shown[sel];
    if(!it)return;
    const url=it.topic.href+(it.id?'#'+it.id:'');
    it.ext?window.open(url,'_blank','noopener'):location.href=url}
  else if(e.key==='Escape'){q.value='';sel=0;doSearch();q.blur()}
});

/* ---------- 热门搜索建议 ---------- */
const HOT=['登录报错','快捷键','MCP','避坑','换电脑','提示词','沙箱','ANR'];
const hot=$('#hot');
hot.insertAdjacentHTML('beforeend',HOT.map(h=>`<button type="button">${h}</button>`).join(''));
hot.addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  q.value=b.textContent;sel=0;doSearch();q.focus();
});

/* ---------- 全局快捷键 ---------- */
addEventListener('keydown',e=>{
  const t=e.target;
  if((e.key==='/'||((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'))
     &&t.tagName!=='INPUT'&&t.tagName!=='TEXTAREA'){
    e.preventDefault();q.focus();q.select();
  }
});
</script>
