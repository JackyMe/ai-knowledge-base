<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 知识库 —— AI 工具官方文档中文版与全网实践精华聚合:Pencil、Claude Code 等,持续扩充。">
<title>AI 知识库 · 主题中心</title>
<style>
:root{
  --ink:#0b1220; --bg:#f6f8fb;
  --text:#1f2430; --text-2:#5a6272; --text-3:#8b93a5;
  --border:#e7eaf0; --border-2:#d9dee8;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  --mono:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.7;font-size:15.5px}
::selection{background:#5b5bf6;color:#fff}

.topbar{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;display:flex;align-items:center;gap:14px;
  padding:0 28px;background:rgba(246,248,251,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px}
.logo .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5b5bf6,#0ea5e9);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;letter-spacing:.5px}
.topbar .right{margin-left:auto;font-size:12.5px;color:var(--text-3);display:flex;align-items:center;gap:8px}
.topbar .right kbd{font-family:var(--mono);font-size:10.5px;border:1px solid var(--border-2);border-radius:4px;
  padding:1px 5px;background:#fff;color:var(--text-3)}

.wrap{max-width:1080px;margin:0 auto;padding:60px 32px 100px}

.hero{margin-top:32px;border-radius:20px;position:relative;overflow:hidden;color:#eaf1fb;
  background:
    radial-gradient(900px 380px at 85% -30%,rgba(14,165,233,.4),transparent 60%),
    radial-gradient(800px 380px at 0% 130%,rgba(91,91,246,.45),transparent 60%),
    var(--ink);
  padding:40px 44px 36px}
.hero h1{font-size:28px;line-height:1.25;letter-spacing:-.5px;font-weight:800;color:#fff;display:inline}
.hero .grad{background:linear-gradient(90deg,#818cf8,#38bdf8);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .tagline{display:inline;margin-left:14px;font-size:13.5px;color:#94a3c0}
.searchbar{margin-top:20px;position:relative}
.searchbar .ic{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5}
.searchbar input{width:100%;padding:15px 110px 15px 46px;font-size:15.5px;font-family:var(--font);
  border:1px solid rgba(255,255,255,.14);border-radius:14px;outline:none;color:#eef3fb;
  background:rgba(255,255,255,.08);transition:.2s}
.searchbar input::placeholder{color:#7e8aa3}
.searchbar input:focus{background:rgba(255,255,255,.13);border-color:rgba(129,140,248,.6)}
.searchbar .keys{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.searchbar .keys kbd{font-family:var(--mono);font-size:10.5px;color:#94a3c0;border:1px solid rgba(255,255,255,.2);
  border-radius:5px;padding:2px 7px}
.hero .qmeta{margin-top:14px;font-size:12px;color:#7e8aa3}

.resume{display:none;margin:18px 0 0;align-items:center;gap:12px;padding:13px 18px;background:#fff;
  border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:.18s;position:relative}
.resume.on{display:flex}
.resume:hover{border-color:#5b5bf6;box-shadow:0 8px 26px rgba(91,91,246,.10)}
.resume .ric{width:36px;height:36px;border-radius:10px;background:#eef0ff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.resume .rt{font-size:11.5px;color:var(--text-3)}
.resume .rl{font-size:14px;font-weight:650;line-height:1.4}
.resume .go{margin-left:auto;color:#5b5bf6;font-weight:700;font-size:13px;white-space:nowrap}
.resume .close{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:99px;border:1px solid var(--border-2);
  background:#fff;color:var(--text-3);font-size:11px;cursor:pointer;line-height:1}

.sec{display:flex;align-items:baseline;gap:14px;margin:40px 0 18px}
.sec h2{font-size:20px;font-weight:800;letter-spacing:-.3px}
.sec span{font-size:12.5px;color:var(--text-3)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:20px}
.topic{position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid var(--border);
  border-radius:18px;padding:24px 26px 18px;text-decoration:none;color:var(--text);transition:.2s;overflow:hidden;cursor:pointer}
.topic::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--tc,#5b5bf6);opacity:.9}
.topic:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(15,23,42,.10);border-color:var(--tc,#5b5bf6)}
.topic .head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.topic .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;background:color-mix(in srgb,var(--tc,#5b5bf6) 10%,#fff);border:1px solid color-mix(in srgb,var(--tc,#5b5bf6) 25%,#fff)}
.topic .tag{font-size:11.5px;font-weight:700;letter-spacing:.08em;color:var(--tc,#5b5bf6);text-transform:uppercase}
.topic .head .arrow{margin-left:auto;color:var(--text-3);font-size:15px;transition:.2s}
.topic:hover .head .arrow{color:var(--tc,#5b5bf6);transform:translateX(3px)}
.topic b.tt{font-size:16.5px;font-weight:750;line-height:1.4;display:block;margin-bottom:6px}
.topic p{font-size:13px;color:var(--text-2);margin-bottom:14px}
.topic .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.topic .chips a{font-size:11.5px;color:var(--text-2);background:#f4f6fa;border:1px solid var(--border);
  padding:3.5px 11px;border-radius:99px;text-decoration:none;transition:.15s;white-space:nowrap}
.topic .chips a:hover{color:var(--tc,#5b5bf6);border-color:var(--tc,#5b5bf6);background:#fff}
.topic .chips a.more{color:var(--text-3);background:transparent;border-style:dashed}
.topic .foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text-3);
  border-top:1px solid var(--border);padding-top:12px;margin-top:auto}

.results{display:none;margin-top:26px}
.results.on{display:block}
.res-count{font-size:12.5px;color:var(--text-3);margin-bottom:12px}
.res{display:flex;align-items:center;gap:12px;padding:12px 18px;background:#fff;border:1px solid var(--border);
  border-radius:12px;text-decoration:none;color:var(--text);margin-bottom:8px;transition:.15s}
.res:hover,.res.sel{border-color:var(--rc,#5b5bf6);box-shadow:0 6px 20px rgba(15,23,42,.07)}
.res.sel{background:#fcfdff}
.res .badge{flex:none;font-size:11px;font-weight:700;color:#fff;background:var(--rc,#5b5bf6);
  padding:3px 10px;border-radius:99px;white-space:nowrap}
.res b{font-size:14px;font-weight:600}
.res .path{font-size:12px;color:var(--text-3);margin-left:2px}
.res .go{margin-left:auto;color:var(--text-3);font-size:13px}
.res:hover .go,.res.sel .go{color:var(--rc,#5b5bf6)}
.res mark{background:#fff3bf;color:inherit;border-radius:3px;padding:0 1px}
.res-empty{padding:34px;text-align:center;color:var(--text-3);font-size:13.5px;background:#fff;
  border:1px dashed var(--border-2);border-radius:14px}

.add-note{margin-top:22px;padding:13px 18px;border:1.5px dashed var(--border-2);border-radius:14px;
  font-size:12.5px;color:var(--text-3);text-align:center}
.add-note code{font-family:var(--mono);font-size:11.5px;background:#fff;border:1px solid var(--border);
  border-radius:5px;padding:1px 6px}

.footer{margin-top:56px;padding-top:24px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text-3);
  display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between}
.footer a{color:var(--text-3)}

@media (max-width:720px){
  .wrap{padding:60px 18px 80px}
  .hero{padding:28px 22px 26px}
  .hero .tagline{display:block;margin:8px 0 0}
  .searchbar input{padding-right:52px}
  .searchbar .keys{display:none}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo"><span class="mark">AI</span>AI 知识库</div>
  <div class="right"><span>按</span><kbd>/</kbd><span>即可搜索全站</span></div>
</header>

<div class="wrap">

<div class="hero">
  <h1>AI <span class="grad">知识库</span></h1><span class="tagline">AI 工具文档中文版 · 全网实践精华 · 持续扩充</span>
  <div class="searchbar">
    <span class="ic">🔍</span>
    <input id="q" placeholder="搜索全部主题与章节,如:快捷键、变量、CLAUDE.md、避坑…" autocomplete="off">
    <span class="keys"><kbd>↑↓</kbd><kbd>Enter</kbd></span>
  </div>
  <div class="qmeta" id="qmeta"></div>
</div>

<a class="resume" id="resume">
  <span class="ric">📖</span>
  <span><span class="rt">继续上次阅读</span><br><span class="rl" id="resumeLabel"></span></span>
  <span class="go">继续 →</span>
  <button class="close" id="resumeClose" title="不再显示">✕</button>
</a>

<div class="results" id="results"></div>

<div id="browse">
  <div class="sec"><h2>全部主题</h2><span id="topicCount"></span></div>
  <div class="grid" id="grid"></div>
  <div class="add-note">＋ 新增主题:HTML 放入 <code>topics/</code>,并在 <code>assets/js/topics.js</code> 追加一条注册 —— 卡片、章节快链与全站搜索自动生效</div>
</div>

<div class="footer">
  <div>AI 知识库 · 非官方资料整理,内容以各来源原文为准</div>
  <div>整理:jackyz · 2026-07</div>
</div>

</div>

<script src="assets/js/topics.js"></script>
<script>
const $=s=>document.querySelector(s);
const escq=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

/* ---------- 主题卡片(含章节快链) ---------- */
const grid=$('#grid');
grid.innerHTML=TOPICS.map(t=>`
  <div class="topic" style="--tc:${t.color}" data-href="${t.href}">
    <div class="head"><div class="ic">${t.icon}</div><div class="tag">${t.tag}</div><span class="arrow">→</span></div>
    <b class="tt">${escq(t.title)}</b>
    <p>${escq(t.desc)}</p>
    <div class="chips">
      ${t.sections.slice(0,6).map(s=>`<a href="${t.href}#${s.id}" onclick="event.stopPropagation()">${escq(s.label)}</a>`).join('')}
      <a class="more" href="${t.href}" onclick="event.stopPropagation()">全部 ${t.sections.length} 章</a>
    </div>
    <div class="foot">${t.meta.map(m=>`<span>${escq(m)}</span>`).join(' · ')}</div>
  </div>`).join('');
document.querySelectorAll('.topic[data-href]').forEach(c=>
  c.addEventListener('click',()=>location.href=c.dataset.href));
$('#topicCount').textContent=`${TOPICS.length} 个主题 · ${TOPICS.reduce((n,t)=>n+t.sections.length,0)} 个章节`;

/* ---------- 继续上次阅读(与主题页 site.js 的记录联动) ---------- */
try{
  const last=JSON.parse(localStorage.getItem('pkb-last')||'null');
  const dismissed=localStorage.getItem('pkb-resume-dismissed');
  const hit=last&&last.page&&TOPICS.find(t=>t.href.split('/').pop()===last.page);
  if(hit&&dismissed!==String(last.ts)){
    const r=$('#resume');
    r.href=hit.href+'#'+last.anchor;
    $('#resumeLabel').textContent=`${last.doc} › ${last.label}`;
    r.classList.add('on');
    $('#resumeClose').addEventListener('click',e=>{
      e.preventDefault();e.stopPropagation();
      localStorage.setItem('pkb-resume-dismissed',String(last.ts));
      r.classList.remove('on');
    });
  }
}catch(e){}

/* ---------- 全站搜索(主题 + 章节直达) ---------- */
const INDEX=[];
TOPICS.forEach(t=>{
  INDEX.push({topic:t,label:t.title,id:'',text:(t.title+' '+t.desc+' '+t.tag).toLowerCase(),isTopic:true});
  t.sections.forEach(s=>INDEX.push({topic:t,label:s.label,id:s.id,text:(s.label+' '+t.title).toLowerCase(),isTopic:false}));
});
const q=$('#q'),results=$('#results'),browse=$('#browse'),qmeta=$('#qmeta');
let sel=0,shown=[];
qmeta.textContent=`已收录 ${INDEX.length} 条可跳转条目`;
function hl(s,kw){if(!kw)return escq(s);
  const i=s.toLowerCase().indexOf(kw);if(i<0)return escq(s);
  return escq(s.slice(0,i))+'<mark>'+escq(s.slice(i,i+kw.length))+'</mark>'+escq(s.slice(i+kw.length))}
function doSearch(){
  const kw=q.value.trim().toLowerCase();
  if(!kw){results.classList.remove('on');browse.style.display='';shown=[];return}
  shown=INDEX.filter(it=>it.text.includes(kw)).slice(0,30);
  if(sel>=shown.length)sel=Math.max(0,shown.length-1);
  browse.style.display='none';results.classList.add('on');
  results.innerHTML=shown.length?
    `<div class="res-count">${shown.length} 条结果 · Enter 打开选中项</div>`+
    shown.map((it,i)=>`
      <a class="res${i===sel?' sel':''}" style="--rc:${it.topic.color}" data-i="${i}"
         href="${it.topic.href}${it.id?'#'+it.id:''}">
        <span class="badge">${it.topic.tag}</span>
        <b>${hl(it.label,kw)}</b>
        ${it.isTopic?'':`<span class="path">${escq(it.topic.title)}</span>`}
        <span class="go">打开 →</span>
      </a>`).join('')
    :'<div class="res-empty">没有匹配结果——换个关键词试试,或浏览下方全部主题</div>';
  const s=results.querySelector('.res.sel');s&&s.scrollIntoView({block:'nearest'});
}
q.addEventListener('input',()=>{sel=0;doSearch()});
q.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();if(sel<shown.length-1)sel++;doSearch()}
  else if(e.key==='ArrowUp'){e.preventDefault();if(sel>0)sel--;doSearch()}
  else if(e.key==='Enter'){e.preventDefault();const it=shown[sel];
    if(it)location.href=it.topic.href+(it.id?'#'+it.id:'')}
  else if(e.key==='Escape'){q.value='';sel=0;doSearch();q.blur()}
});
addEventListener('keydown',e=>{
  const t=e.target;
  if((e.key==='/'||((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'))
     &&t.tagName!=='INPUT'&&t.tagName!=='TEXTAREA'){
    e.preventDefault();q.focus();q.select();
  }
});
</script>
</body>
</html>
