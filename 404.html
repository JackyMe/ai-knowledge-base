<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>页面不存在 · AI 知识库</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
  :root{--ink:#0b1220;--text:#1f2430;--text-2:#5a6272;--text-3:#8b93a5;--border:#e7eaf0;--brand:#5b5bf6}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text);background:#f6f8fb;display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:32px}
  .card{max-width:560px;width:100%;border-radius:20px;overflow:hidden;color:#eaf1fb;
    background:radial-gradient(900px 380px at 85% -30%,rgba(14,165,233,.4),transparent 60%),
      radial-gradient(800px 380px at 0% 130%,rgba(91,91,246,.45),transparent 60%),var(--ink);
    padding:48px 40px;text-align:center}
  .num{font-size:64px;font-weight:800;letter-spacing:-2px;
    background:linear-gradient(90deg,#818cf8,#38bdf8);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:20px;font-weight:700;margin-top:10px}
  p{margin-top:10px;font-size:14px;color:#a5b0cf;line-height:1.7}
  .actions{margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;text-decoration:none;
    padding:10px 20px;border-radius:99px;transition:.15s}
  a.primary{background:var(--brand);color:#fff}
  a.primary:hover{background:#4a4af0}
  a.ghost{background:rgba(255,255,255,.08);color:#eaf1fb;border:1px solid rgba(255,255,255,.16)}
  a.ghost:hover{background:rgba(255,255,255,.14)}
</style>
</head>
<body>
<div class="card">
  <div class="num">404</div>
  <h1>这个页面不存在</h1>
  <p>链接可能失效了,或者章节路径改过。回首页用搜索找一下,通常比瞎猜链接更快。</p>
  <div class="actions">
    <a class="btn primary" href="https://aidoc-zq.netlify.app/">回首页</a>
    <a class="btn ghost" href="https://aidoc-zq.netlify.app/topics/claude-code-guide.html">Claude Code 指南</a>
    <a class="btn ghost" href="https://aidoc-zq.netlify.app/topics/codex-guide.html">Codex 指南</a>
  </div>
</div>
</body>
</html>
